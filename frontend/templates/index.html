<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum-Secured Chatbot</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            height: 90vh;
            max-height: 600px;
        }
        
        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 3px solid #667eea;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 15px;
        }
        
        .header h1 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .security-badge {
            display: inline-block;
            background: #4CAF50;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .quantum-indicator {
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 12px;
        }
        
        .quantum-indicator.active {
            background: rgba(76, 175, 80, 0.3);
            color: #4CAF50;
        }
        
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .control-group label {
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .control-group input,
        .control-group select {
            padding: 8px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .btn {
            padding: 10px 20px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .stats {
            margin-top: auto;
            padding-top: 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.3);
            font-size: 12px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }
        
        .chat-header {
            background: white;
            padding: 20px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h2 {
            color: #333;
            font-size: 20px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #4CAF50;
            border-radius: 50%;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            display: flex;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.own {
            justify-content: flex-end;
        }
        
        .message-content {
            background: white;
            padding: 12px 16px;
            border-radius: 10px;
            max-width: 70%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .message.own .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 2px;
        }
        
        .message.other .message-content {
            background: white;
            border-bottom-left-radius: 2px;
        }
        
        .message-sender {
            font-size: 12px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
            margin-left: 12px;
        }
        
        .message.own .message-sender {
            text-align: right;
            margin-right: 12px;
            margin-left: 0;
        }
        
        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 5px;
        }
        
        .system-message {
            text-align: center;
            color: #999;
            font-size: 12px;
            font-style: italic;
            padding: 10px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .input-area {
            background: white;
            padding: 20px;
            border-top: 2px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-area button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .input-area button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        
        .input-area button:active {
            transform: translateY(0);
        }
        
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px 15px;
            background: #4CAF50;
            color: white;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .connection-status.offline {
            background: #f44336;
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
            }
            
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 3px solid #667eea;
            }
            
            .message-content {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div id="connection-status" class="connection-status">Connected</div>
    
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="header">
                <h1>⚛️ Quantum Chat</h1>
                <p>BB84 Protocol</p>
                <div class="security-badge">🔒 SECURE</div>
            </div>
            
            <div id="quantum-indicator" class="quantum-indicator">
                Generating Quantum Key...
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your name" value="User" />
                </div>
                
                <div class="control-group">
                    <label for="room">Chat Room</label>
                    <input type="text" id="room" placeholder="Room name" value="General" />
                </div>
                
                <button class="btn" onclick="joinRoom()">Join Chat</button>
                <button class="btn" onclick="leaveRoom()" style="background: #f44336; color: white;">Leave Chat</button>
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <span>Active Users:</span>
                    <span id="user-count">0</span>
                </div>
                <div class="stat-item">
                    <span>Messages Sent:</span>
                    <span id="msg-count">0</span>
                </div>
                <div class="stat-item">
                    <span>Key Status:</span>
                    <span id="key-status">Pending</span>
                </div>
            </div>
        </div>
        
        <!-- Main Chat -->
        <div class="main-chat">
            <div class="chat-header">
                <div>
                    <h2 id="room-name">General Chat</h2>
                </div>
                <div>
                    <span style="color: #666; font-size: 14px;" id="users-list">Users: 0</span>
                </div>
            </div>
            
            <div id="messages-container" class="messages-container">
                <div class="system-message">
                    👋 Welcome to Quantum-Secured Chatbot
                </div>
                <div class="system-message">
                    🔐 All messages are encrypted using quantum keys from BB84 protocol
                </div>
            </div>
            
            <div class="input-area">
                <input 
                    type="text" 
                    id="message-input" 
                    placeholder="Type your quantum-secured message..." 
                    onkeypress="handleKeyPress(event)"
                    disabled
                />
                <button onclick="sendMessage()" id="send-btn" disabled>Send</button>
            </div>
        </div>
    </div>
    
    <script>
        // Initialize Socket.IO connection
        const socket = io();
        
        // State variables
        let username = 'User';
        let currentRoom = 'General';
        let messageCount = 0;
        let isConnected = false;
        let keyGenerated = false;
        let userList = new Set();
        
        // Socket connection events
        socket.on('connect', () => {
            console.log('Connected to server');
            isConnected = true;
            updateConnectionStatus(true);
        });
        
        socket.on('disconnect', () => {
            console.log('Disconnected from server');
            isConnected = false;
            updateConnectionStatus(false);
            document.getElementById('message-input').disabled = true;
            document.getElementById('send-btn').disabled = true;
        });
        
        socket.on('connection_response', (data) => {
            console.log('Connection response:', data);
        });
        
        socket.on('quantum_key_generated', (data) => {
            console.log('Quantum key generated:', data);
            keyGenerated = true;
            document.getElementById('quantum-indicator').textContent = 
                `✓ Quantum Key Active (${data.key_length} bits)`;
            document.getElementById('quantum-indicator').classList.add('active');
            document.getElementById('key-status').textContent = 'Active';
            
            // Enable message input
            document.getElementById('message-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            
            addSystemMessage(`🔐 Quantum key generated (${data.key_length} bits) - Communication secured`);
        });
        
        socket.on('user_joined', (data) => {
            console.log('User joined:', data);
            userList = new Set(data.users_in_room);
            document.getElementById('user-count').textContent = userList.size;
            document.getElementById('users-list').textContent = `Users: ${userList.size}`;
            
            addSystemMessage(`👤 ${data.username} joined the chat`);
        });
        
        socket.on('user_left', (data) => {
            console.log('User left:', data);
            addSystemMessage(`👤 ${data.username} left the chat`);
        });
        
        socket.on('receive_message', (data) => {
            console.log('Received message:', data);
            
            if (data.sender === username) {
                addMessage(data.sender, data.message, data.encrypted, 'own', data.timestamp);
            } else {
                addMessage(data.sender, data.message, data.encrypted, 'other', data.timestamp);
            }
        });
        
        socket.on('server_stats', (data) => {
            console.log('Server stats:', data);
        });
        
        socket.on('error', (data) => {
            console.error('Error:', data);
            addSystemMessage(`⚠️ Error: ${data.message}`);
        });
        
        // UI Functions
        function joinRoom() {
            username = document.getElementById('username').value || 'User';
            currentRoom = document.getElementById('room').value || 'General';
            
            if (!username || !currentRoom) {
                alert('Please enter username and room name');
                return;
            }
            
            socket.emit('join', {
                username: username,
                room: currentRoom
            });
            
            document.getElementById('room-name').textContent = currentRoom;
            addSystemMessage(`✓ Joined room: ${currentRoom} as ${username}`);
        }
        
        function leaveRoom() {
            socket.emit('leave', {
                room: currentRoom
            });
            
            document.getElementById('message-input').disabled = true;
            document.getElementById('send-btn').disabled = true;
            keyGenerated = false;
            document.getElementById('quantum-indicator').textContent = 'Generating Quantum Key...';
            document.getElementById('quantum-indicator').classList.remove('active');
            document.getElementById('key-status').textContent = 'Pending';
            
            addSystemMessage(`Left room: ${currentRoom}`);
        }
        
        function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const message = messageInput.value.trim();
            
            if (!message) return;
            if (!isConnected) {
                alert('Not connected to server');
                return;
            }
            if (!keyGenerated) {
                alert('Quantum key not yet generated');
                return;
            }
            
            socket.emit('send_message', {
                room: currentRoom,
                message: message
            });
            
            messageInput.value = '';
            messageCount++;
            document.getElementById('msg-count').textContent = messageCount;
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        function addMessage(sender, message, encrypted, type, timestamp) {
            const container = document.getElementById('messages-container');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const senderSpan = document.createElement('div');
            senderSpan.className = 'message-sender';
            senderSpan.textContent = sender;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // Plaintext message
            const messageText = document.createElement('div');
            messageText.textContent = message;
            messageText.style.fontSize = '14px';
            messageText.style.color = '#333';
            messageText.style.fontWeight = '500';
            messageText.style.marginBottom = '5px';
            messageText.style.wordWrap = 'break-word';
            
            // Encrypted preview
            const encryptedText = document.createElement('div');
            encryptedText.textContent = '🔒 ' + (encrypted ? encrypted.substring(0, 60) + (encrypted.length > 60 ? '...' : '') : 'encrypted');
            encryptedText.style.fontSize = '11px';
            encryptedText.style.color = '#999';
            encryptedText.style.fontFamily = 'monospace';
            encryptedText.style.backgroundColor = '#f5f5f5';
            encryptedText.style.padding = '5px';
            encryptedText.style.borderRadius = '3px';
            encryptedText.style.marginBottom = '5px';
            encryptedText.title = 'Quantum-encrypted ciphertext (XOR with BB84 key)';
            
            // Timestamp
            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            timeSpan.textContent = new Date(timestamp).toLocaleTimeString();
            
            contentDiv.appendChild(messageText);
            contentDiv.appendChild(encryptedText);
            contentDiv.appendChild(timeSpan);
            
            messageDiv.appendChild(senderSpan);
            messageDiv.appendChild(contentDiv);
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function addSystemMessage(text) {
            const container = document.getElementById('messages-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'system-message';
            messageDiv.textContent = text;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function updateConnectionStatus(connected) {
            const status = document.getElementById('connection-status');
            if (connected) {
                status.textContent = 'Connected';
                status.classList.remove('offline');
            } else {
                status.textContent = 'Disconnected';
                status.classList.add('offline');
            }
        }
        
        // Initialize
        console.log('Quantum Chat Client initialized');
    </script>
</body>
</html>
